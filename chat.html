<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | mayaboti</title>

    <link rel="stylesheet" href="styl.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<nav class="main-nav">
    <a href="index.html">HOME</a>
    <a href="band.html">BRANDS</a>
    <a href="categories.html">CATEGORIES</a>
    <a href="cart.html">CART</a>
    <a href="chat.html">CHAT</a>
</nav>

<header>
    <h1>Contact Us</h1>
    <p>We're here to help you.</p>
</header>

<main class="contact-container">

    <!-- Phone -->
    <a href="tel:+8801700000000" class="contact-card">

        <div class="icon phone">
            <i class="fa-solid fa-phone"></i>
        </div>

        <div class="info">
            <h2>Call Us</h2>
            <p>Tap to call our support team</p>
        </div>

    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/8801700000000" class="contact-card" target="_blank">

        <div class="icon whatsapp">
            <i class="fa-brands fa-whatsapp"></i>
        </div>

        <div class="info">
            <h2>WhatsApp</h2>
            <p>Start a WhatsApp conversation</p>
        </div>

    </a>

    <!-- Gmail -->
    <a href="mailto:support@mayaboti.com" class="contact-card">

        <div class="icon gmail">
            <i class="fa-solid fa-envelope"></i>
        </div>

        <div class="info">
            <h2>Email Us</h2>
            <p>support@mayaboti.com</p>
        </div>

    </a>

    <!-- Facebook -->
    <a href="https://facebook.com/" class="contact-card" target="_blank">

        <div class="icon facebook">
            <i class="fa-brands fa-facebook-f"></i>
        </div>

        <div class="info">
            <h2>Facebook</h2>
            <p>Visit our Facebook Page</p>
        </div>

    </a>

    <!-- Customer Support -->
    <div class="contact-card">

        <div class="icon support">
            <i class="fa-solid fa-headset"></i>
        </div>

        <div class="info">
            <h2>Customer Support</h2>
            <p>Saturday - Thursday</p>
            <p>9:00 AM - 9:00 PM</p>
        </div>

    </div>

</main>

<script src="styl.js"></script>

</body>
</html>
