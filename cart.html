<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | mayaboti</title>

    <link rel="stylesheet" href="styl.css">

    <script src="config.js" defer></script>
    <script src="auth.js" defer></script>
    <script src="styl.js" defer></script>
</head>

<body>

<main class="cart-container">

    <h1 class="cart-title">🛒 Shopping Cart</h1>

    <p id="cartError" class="form-error" hidden></p>
    <p id="cartSuccess" class="form-success" hidden></p>

    <section id="cartItems">

        <article class="cart-item" data-price="15">

            <div class="product">
                <img
                    src="https://via.placeholder.com/90"
                    loading="lazy"
                    alt="Magic Hair Oil">

                <div>
                    <h3>Magic Hair Oil</h3>
                    <p>$15.00</p>
                </div>
            </div>

            <div class="qty">
                <button class="minus">−</button>
                <span class="count">1</span>
                <button class="plus">+</button>
            </div>

            <button class="remove">Remove</button>

        </article>

        <article class="cart-item" data-price="12">

            <div class="product">
                <img
                    src="https://via.placeholder.com/90"
                    loading="lazy"
                    alt="Saffron Soap">

                <div>
                    <h3>Saffron Soap</h3>
                    <p>$12.00</p>
                </div>
            </div>

            <div class="qty">
                <button class="minus">−</button>
                <span class="count">2</span>
                <button class="plus">+</button>
            </div>

            <button class="remove">Remove</button>

        </article>

    </section>

    <section class="summary">

        <h2>Order Summary</h2>

        <div class="summary-row">
            <span>Subtotal</span>
            <strong id="subtotal">$39.00</strong>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <strong>$5.00</strong>
        </div>

        <hr>

        <div class="summary-row">
            <h2>Total</h2>
            <h2 id="total">$44.00</h2>
        </div>

        <button id="checkoutBtn" class="checkout">
            Proceed to Checkout
        </button>

    </section>

</main>

<nav class="main-nav">
    <a href="index.html">HOME</a>
    <a href="band.html">BRANDS</a>
    <a href="categories.html">CATEGORIES</a>
    <a href="cart.html">CART</a>
    <a href="chat.html">CHAT</a>
</nav>

</body>
</html>
